<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="before">
        <label for="ertek">Váltandó érték: </label>
        <input type="number" name="ertek" id="ertek"> HUF
        <input type="radio" name="valuta" id="eur" value="EUR">
        <label for="eur">EUR</label>
        <input type="radio" name="valuta" id="gbp" value="GBP">
        <label for="gbp">GBP</label>
        <input type="radio" name="valuta" id="usd" value="USD">
        <label for="usd">USD</label><br><br>

        <button id="btn">Váltás</button>
    </div>
    <div id="after">
        <label for="eredmeny">Váltott valuta: </label>
        <input id="eredmeny" type="number" disabled><span id="eredmenyValuta"></span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
